<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h1>Simple Calculator</h1>
   <p>Perform under JavaScript
   </p>
   <p id="add"></p>
   <p id="sub"></p>
   <p id="multiply"></p>
   <p id="div"></p>
    <script>
        var a = 13
        var b = 48

        var add= a+b
    var sub= a-b
    var multiply= a*b
    var div= a/b 

    document.getElementById("add").innerHTML=
    "The added value is: " +add
    document.getElementById("sub").innerHTML=
    "The added value is: " +sub
    document.getElementById("multiply").innerHTML=
    "The added value is: " +multiply
    document.getElementById("div").innerHTML=
    "The added value is: " +div
    </script>
    
</body>
</html>
